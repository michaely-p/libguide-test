<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Science Database</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">
  <nav class="navbar navbar-light bg-white border-bottom sticky-top shadow-sm">
    <div class="container-fluid px-4">
      <span class="navbar-brand mb-0 h1 fs-5 fw-bold">Featured Databases in Science</span>
    </div>
  </nav>

  <main class="container-fluid px-3 px-lg-4 py-3">
    <div class="row g-3">
      <aside class="col-lg-2">
        <div class="sticky-lg-top sidebar-sticky">
          <div class="input-group input-group-sm mb-3 shadow-sm">
            <span class="input-group-text bg-white border-end-0">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            </span>
            <input type="search" class="form-control form-control-sm border-start-0" id="search" placeholder="Search…" autocomplete="off">
          </div>

          <div class="card shadow-sm border-0 mb-3">
            <div class="card-body py-2 px-3 d-flex flex-column gap-2">
              <div class="form-check mb-0">
                <input class="form-check-input" type="checkbox" id="librarySupported">
                <label class="form-check-label small" for="librarySupported">Library Supported</label>
              </div>
              <div class="form-check mb-0">
                <input class="form-check-input" type="checkbox" id="aiFeatured">
                <label class="form-check-label small" for="aiFeatured">AI Featured</label>
              </div>
            </div>
          </div>

          <div class="card shadow-sm border-0">
            <div class="card-header bg-white d-flex justify-content-between align-items-center py-2">
              <span class="text-uppercase text-muted fw-semibold small">Subjects</span>
              <button type="button" class="btn btn-link btn-sm p-0 text-decoration-none" id="clearSubjects">Clear</button>
            </div>
            <div class="card-body py-2 px-3 overflow-auto subjects-scroll" id="subjects"></div>
          </div>
        </div>
      </aside>

      <section class="col-lg-10">
        <p class="text-center text-muted py-5" id="status">Loading…</p>
        <div id="catalog" class="row row-cols-1 row-cols-sm-2 row-cols-xl-4 g-3"></div>
        <div class="text-center text-muted py-5 d-none" id="empty">
          <p class="mb-2">No databases match your filters.</p>
          <button type="button" class="btn btn-outline-primary btn-sm" id="reset">Reset filters</button>
        </div>
      </section>
    </div>
  </main>

  <div class="modal fade" id="detailModal" tabindex="-1" aria-labelledby="modalTitle" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content border-0 shadow">
        <div class="modal-header border-bottom-0 pb-0">
          <div class="d-flex align-items-center gap-3">
            <div id="modalIcon"></div>
            <div>
              <p class="text-uppercase fw-semibold small mb-1" id="modalCat"></p>
              <h2 class="modal-title fs-5 fw-bold mb-0" id="modalTitle"></h2>
            </div>
          </div>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body pt-3">
          <p class="mb-3" id="modalIntro"></p>
          <div class="d-flex flex-wrap gap-1" id="modalTags"></div>
        </div>
        <div class="modal-footer border-top-0 pt-0">
          <a class="btn btn-primary w-100 d-none" id="modalLink" href="#" target="_blank" rel="noopener">Access Database</a>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
