<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Science Database</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

  <main class="container-fluid px-2 px-sm-3 px-lg-4 py-2 py-lg-3">
    <div class="row g-3">
      <aside class="col-lg-2">
        <div class="sticky-lg-top sidebar-sticky">
          <button type="button" class="btn btn-outline-secondary btn-sm d-lg-none mb-2 w-100" data-bs-toggle="collapse" data-bs-target="#filterCollapse" aria-expanded="false" aria-controls="filterCollapse">
            Filters
          </button>
          <div class="collapse d-lg-block" id="filterCollapse">
          <div class="filter-panel">
            <div class="filter-search input-group input-group-sm">
              <span class="input-group-text bg-white border-end-0">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
              </span>
              <input type="search" class="form-control form-control-sm border-start-0" id="search" placeholder="Search databases…" autocomplete="off">
            </div>

            <div class="filter-group">
              <span class="filter-group-label">Library Supported</span>
              <div class="filter-chips">
                <div class="filter-chip-item">
                  <input class="filter-chip-input" type="checkbox" id="librarySupported">
                  <label class="filter-chip" for="librarySupported">Library Supported</label>
                </div>
                <div class="filter-chip-item">
                  <input class="filter-chip-input" type="checkbox" id="freeResources">
                  <label class="filter-chip" for="freeResources">Free Resource</label>
                </div>
              </div>
            </div>

            <div class="filter-group">
              <span class="filter-group-label">With AI Features</span>
              <div class="filter-chips">
                <div class="filter-chip-item">
                  <input class="filter-chip-input" type="checkbox" id="aiFeatures">
                  <label class="filter-chip" for="aiFeatures">With AI Features</label>
                </div>
                <div class="filter-chip-item">
                  <input class="filter-chip-input" type="checkbox" id="traditional">
                  <label class="filter-chip" for="traditional">Traditional Databases</label>
                </div>
              </div>
            </div>

            <div class="filter-group">
              <div class="filter-group-header">
                <span class="filter-group-label mb-0">Subjects</span>
                <button type="button" class="btn btn-link btn-sm p-0 text-decoration-none filter-clear-link" id="clearSubjects">Clear</button>
              </div>
              <div class="filter-chips" id="subjects"></div>
            </div>

            <div class="filter-footer">
              <button type="button" class="btn btn-link btn-sm p-0 text-decoration-none filter-clear-link" id="filterReset">Reset all</button>
            </div>
          </div>
          </div>
        </div>
      </aside>

      <section class="col-lg-10">
        <div class="d-flex justify-content-end mb-3" aria-label="Catalog layout options">
          <div class="btn-group btn-group-sm" role="group" aria-label="Catalog layout">
            <button type="button" class="btn btn-primary" id="cardView" data-view-mode="cards" aria-pressed="true">Card</button>
            <button type="button" class="btn btn-outline-primary" id="tableView" data-view-mode="table" aria-pressed="false">Table</button>
          </div>
        </div>
        <p class="text-center text-muted py-5" id="status">Loading…</p>
        <div id="catalog" class="row row-cols-1 row-cols-sm-2 row-cols-xl-4 g-3"></div>
        <div class="text-center text-muted py-5 d-none" id="empty">
          <p class="mb-2">No databases match your filters.</p>
          <button type="button" class="btn btn-outline-primary btn-sm" id="reset">Reset filters</button>
        </div>
      </section>
    </div>
  </main>

  <div class="modal fade" id="detailModal" tabindex="-1" aria-labelledby="modalTitle" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-fullscreen-sm-down">
      <div class="modal-content border-0 shadow">
        <div class="modal-header border-bottom-0 pb-0">
          <div class="d-flex align-items-center gap-3">
            <div id="modalIcon"></div>
            <div>
              <p class="text-uppercase fw-semibold small mb-1" id="modalCat"></p>
              <h2 class="modal-title fs-5 fw-bold mb-0" id="modalTitle"></h2>
            </div>
          </div>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body pt-3">
          <p class="mb-3" id="modalIntro"></p>
          <div class="d-flex flex-wrap gap-1" id="modalTags"></div>
        </div>
        <div class="modal-footer border-top-0 pt-0">
          <a class="btn btn-primary w-100 d-none" id="modalLink" href="#" target="_blank" rel="noopener">Access Database</a>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
