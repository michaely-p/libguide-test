<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Academic database catalog — browse by function, filter by subject, and access resources quickly">
  <title>Database Catalog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="#" class="brand" aria-label="Database Catalog home">
        <div class="brand-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
            <ellipse cx="12" cy="5" rx="9" ry="3"/>
            <path d="M3 5v14c0 1.66 4.03 3 9 3s9-1.34 9-3V5"/>
            <path d="M3 12c0 1.66 4.03 3 9 3s9-1.34 9-3"/>
          </svg>
        </div>
        <h1>Database Catalog</h1>
      </a>

      <div class="header-controls">
        <label class="search-box" for="searchInput">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <input type="search" id="searchInput" placeholder="Search databases…" autocomplete="off">
        </label>

        <div class="subject-filter-wrap" id="subjectFilterWrap">
          <button type="button" class="filter-toggle" id="filterToggle" aria-expanded="false" aria-controls="subjectFilterPanel">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>
            </svg>
            Subjects
            <span class="filter-badge hidden" id="filterBadge">0</span>
          </button>
          <div class="filter-dropdown hidden" id="subjectFilterPanel" role="dialog" aria-label="Filter by subject">
            <div class="filter-dropdown-header">
              <h2>Filter by Subject</h2>
              <div class="filter-actions">
                <button type="button" class="btn-text" id="selectAllBtn">All</button>
                <button type="button" class="btn-text" id="clearAllBtn">Clear</button>
              </div>
            </div>
            <div class="subject-filters" id="subjectFilters" role="group" aria-label="Subject filters"></div>
          </div>
        </div>
      </div>
    </div>
  </header>

  <main class="main-content">
    <div class="loading" id="loading">
      <div class="spinner" aria-hidden="true"></div>
      <p>Loading…</p>
    </div>

    <div class="error-message hidden" id="errorMessage" role="alert"></div>

    <div class="database-sections" id="databaseSections"></div>

    <p class="empty-state hidden" id="emptyState">No databases match your filters.</p>
  </main>

  <div class="modal-overlay hidden" id="modalOverlay" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle" id="detailModal">
      <button type="button" class="modal-close" id="modalClose" aria-label="Close details">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 6 6 18M6 6l12 12"/>
        </svg>
      </button>

      <div class="modal-header">
        <div class="modal-icon" id="modalIcon" aria-hidden="true"></div>
        <div>
          <span class="modal-type" id="modalFunction"></span>
          <h2 id="modalTitle"></h2>
        </div>
      </div>

      <div class="modal-body">
        <section class="detail-section">
          <h3>Introduction</h3>
          <p id="modalIntro"></p>
        </section>

        <section class="detail-section">
          <h3>Key Features</h3>
          <ul class="feature-list" id="modalFeatures"></ul>
        </section>

        <section class="detail-section detail-grid">
          <div>
            <h3>Coverage</h3>
            <p id="modalCoverage"></p>
          </div>
          <div>
            <h3>Database Type</h3>
            <p id="modalType"></p>
          </div>
        </section>

        <section class="detail-section">
          <h3>Related Subjects</h3>
          <div class="tag-list" id="modalSubjects"></div>
        </section>
      </div>

      <div class="modal-footer">
        <a class="btn-primary" id="modalAccessBtn" href="#" target="_blank" rel="noopener noreferrer">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
            <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
          </svg>
          Access Database
        </a>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
